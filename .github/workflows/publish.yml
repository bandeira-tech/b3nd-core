name: Publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      npm_only:
        description: "Skip JSR; publish only the npm slice (catch npm up to an already-published JSR version)"
        type: boolean
        default: false

jobs:
  jsr:
    name: Publish to JSR
    if: ${{ github.event.inputs.npm_only != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with: { deno-version: v2.x }
      - run: deno publish

  npm:
    name: Publish to NPM
    needs: jsr
    if: ${{ always() && (needs.jsr.result == 'success' || needs.jsr.result == 'skipped') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with: { deno-version: v2.x }
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      # Trusted publishing (OIDC) needs npm >= 11.5.1; Node 22 ships npm 10.
      - run: npm install -g npm@latest
      - run: deno task build:npm
      - run: npm publish --access public
        working-directory: npm
